<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeValue 인증</title>
    <style>
        /* 기존 스타일 유지 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background-color: #f2f4f7; padding: 20px;
        }
        .auth-container { 
            background: white; padding: 40px 25px; border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); text-align: center; 
            width: 100%; max-width: 380px;
        }
        .brand-title { font-size: 1.8rem; font-weight: 800; color: #1a73e8; margin-bottom: 8px; letter-spacing: -0.5px; }
        .input-group { margin-bottom: 15px; }
        input[type="password"] { 
            width: 100%; padding: 18px; font-size: 1.1rem; text-align: center; 
            border: 2px solid #f0f2f5; border-radius: 16px; letter-spacing: 2px;
            background-color: #f9fafb; transition: all 0.3s ease;
        }
        input[type="password"]:focus { outline: none; border-color: #1a73e8; background-color: #fff; box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1); }

        /* 체크박스 스타일 추가 */
        .remember-group {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .remember-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .remember-group label {
            font-size: 0.9rem;
            color: #666;
            cursor: pointer;
        }

        button { 
            width: 100%; padding: 18px; background-color: #1a73e8; color: white; border: none; 
            border-radius: 16px; cursor: pointer; font-size: 1.1rem; font-weight: 700;
            transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }
        button:active { transform: scale(0.97); background-color: #1557b0; }
        #message { color: #d93025; margin-top: 20px; font-size: 0.85rem; font-weight: 500; min-height: 1.2em; }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="brand-title">WeValue</div>
    <p style="color: #444; font-size: 1rem; margin-bottom: 20px; font-weight: 600;">보안 인증이 필요합니다</p>
    
    <div class="input-group">
        <input type="password" id="authCode" maxlength="10" inputmode="text" placeholder="인증 번호를 입력하세요" autocomplete="off">
    </div>

    <!-- 체크박스 영역 추가 -->
    <div class="remember-group">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">인증 상태 유지하기</label>
    </div>
    
    <button onclick="handleAuth()">인증 확인</button>
    <div id="message"></div>
</div>

<script>
    // 페이지 로드 시 자동 인증 확인
    window.onload = function() {
        if (localStorage.getItem('isAuthorized') === 'true') {
            window.location.href = "home.html";
        }
    };

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleAuth() {
        const input = document.getElementById('authCode').value;
        const rememberMe = document.getElementById('rememberMe').checked;
        const messageDiv = document.getElementById('message');
        const btn = document.querySelector('button');
        
        const correctHash = "034f7b198dc1cab8e07cbcfaa04680b14fe67a49daa01c100b776244d257462c"; 
        
        if (!input) {
            messageDiv.innerText = "번호를 입력해 주세요.";
            return;
        }

        btn.innerText = "확인 중...";
        btn.disabled = true;

        const inputHash = await sha256(input);

        if (inputHash === correctHash) {
            // 체크 여부에 따라 저장소 분기
            if (rememberMe) {
                localStorage.setItem('isAuthorized', 'true');
            } else {
                sessionStorage.setItem('isAuthorized', 'true');
            }
            window.location.href = "home.html";
        } else {
            messageDiv.innerText = "인증 번호가 일치하지 않습니다.";
            document.getElementById('authCode').value = "";
            btn.innerText = "인증 확인";
            btn.disabled = false;
        }
    }

    document.getElementById('authCode').addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') await handleAuth();
    });
</script>
</body>
</html>
