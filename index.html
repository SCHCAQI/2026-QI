<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>보안 인증</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f8f9fa; }
        .auth-container { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); text-align: center; }
        input { width: 180px; padding: 12px; font-size: 1.5rem; text-align: center; border: 2px solid #eee; border-radius: 8px; margin-bottom: 1.5rem; letter-spacing: 5px; }
        input:focus { outline: none; border-color: #007bff; }
        button { padding: 12px 30px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #message { color: #dc3545; margin-top: 15px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>보안 인증</h2>
    <p>인증 번호를 입력하세요.</p>
    <input type="password" id="authCode" maxlength="6" placeholder="******">
    <br>
    <button onclick="handleAuth()">인증하기</button>
    <div id="message"></div>
</div>

<script>
    // SHA-256 해시 생성 함수
    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleAuth() {
        const input = document.getElementById('authCode').value;
        const messageDiv = document.getElementById('message');
        
        // 다른 번호를 쓰고 싶다면 미리 해싱된 값을 여기에 넣으세요.
        const correctHash = "39626388960098f6233405f6365b26391d1797868037367858c87c936034f59c"; 

        const inputHash = await sha256(input);

        if (inputHash === correctHash) {
            // 인증 성공: 세션 스토리지에 플래그 저장 (임시 보안)
            sessionStorage.setItem('isAuthorized', 'true');
            window.location.href = "home.html";
        } else {
            messageDiv.innerText = "인증 번호가 일치하지 않습니다.";
            document.getElementById('authCode').value = "";
        }
    }

    // 엔터키 지원
    document.getElementById('authCode').addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') await handleAuth();
    });
</script>

</body>
</html>
