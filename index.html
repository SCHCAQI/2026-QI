<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeValue 인증</title>
    <style>
        /* 기본 스타일 초기화 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f2f4f7; /* 부드러운 배경색 */
            padding: 20px;
        }

        .auth-container { 
            background: white; 
            padding: 40px 25px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            text-align: center; 
            width: 100%;
            max-width: 380px;
        }

        /* 타이틀 섹션 */
        .brand-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a73e8; /* 브랜드 컬러 */
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .brand-subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input { 
            width: 100%; 
            padding: 18px; 
            font-size: 1.1rem; 
            text-align: center; 
            border: 2px solid #f0f2f5; 
            border-radius: 16px; 
            letter-spacing: 2px;
            background-color: #f9fafb;
            transition: all 0.3s ease;
        }

        input:focus { 
            outline: none; 
            border-color: #1a73e8; 
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
        }

        button { 
            width: 100%;
            padding: 18px; 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 16px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        button:active { 
            transform: scale(0.97); 
            background-color: #1557b0; 
        }

        #message { 
            color: #d93025; 
            margin-top: 20px; 
            font-size: 0.85rem; 
            font-weight: 500;
            min-height: 1.2em; 
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="brand-title">WeValue</div>
    <div class="brand-subtitle"></div>
    
    <p style="color: #444; font-size: 1rem; margin-bottom: 20px; font-weight: 600;">보안 인증이 필요합니다</p>
    
    <div class="input-group">
        <input 
               id="authCode" 
               maxlength="10" 
               inputmode="text" 
               placeholder="인증 번호를 입력하세요"
               autocomplete="off">
    </div>
    
    <button onclick="handleAuth()">인증 확인</button>
    <div id="message"></div>
</div>

<script>
    // SHA-256 해시 생성 함수
    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleAuth() {
        const input = document.getElementById('authCode').value;
        const messageDiv = document.getElementById('message');
        const btn = document.querySelector('button');
        
        const correctHash = "034f7b198dc1cab8e07cbcfaa04680b14fe67a49daa01c100b776244d257462c"; 
        
        if (!input) {
            messageDiv.innerText = "번호를 입력해 주세요.";
            return;
        }

        btn.innerText = "확인 중...";
        btn.style.opacity = "0.7";
        btn.disabled = true;

        const inputHash = await sha256(input);

        if (inputHash == correctHash) {
            sessionStorage.setItem('isAuthorized', 'true');
            window.location.href = "home.html";
        } else {
            messageDiv.innerText = "인증 번호가 일치하지 않습니다.";
            document.getElementById('authCode').value = "";
            btn.innerText = "인증 확인";
            btn.style.opacity = "1";
            btn.disabled = false;
        }
    }

    // 엔터키 지원
    document.getElementById('authCode').addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') await handleAuth();
    });
</script>

</body>
</html>
