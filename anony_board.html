<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeValue - 우리가치 익명게시판</title>
    <link rel="icon" href="wevalue_w.png" type="image/png">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root { 
            --primary: #7c4dff; /* 조금 더 세련된 바이올렛 */
            --primary-soft: #f3efff;
            --bg: #f2f4f7; 
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --text: #1a1a1a; 
            --text-light: #707070;
            --border: #eaecf0; 
            --input-bg: #ffffff;
            --overlay: rgba(255, 255, 255, 0.8);
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        [data-theme='dark'] {
            --bg: #121212;
            --header-bg: #1e1e1e;
            --card-bg: #1e1e1e;
            --text: #e8e8e8;
            --text-light: #a0a0a0;
            --border: #2c2c2c;
            --input-bg: #2a2a2a;
            --overlay: rgba(0, 0, 0, 0.8);
            --primary-soft: #2d1b4d;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text); 
            padding-bottom: 40px; 
            transition: background 0.3s, color 0.3s; 
            line-height: 1.5;
        } 

        /* Header */
        header { 
            background: var(--header-bg); 
            padding: 0 20px; 
            height: 64px;
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: var(--shadow);
        }
        .header-logo { width: 32px; height: 32px; margin-right: 10px; border-radius: 8px; }
        .brand-name { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }

        /* Search Bar */
        .search-container { padding: 15px 20px; background: var(--header-bg); }
        .search-input { 
            border: 1px solid var(--border); 
            background: var(--bg); 
            border-radius: 12px; 
            padding: 10px 16px; 
            font-size: 14px;
            transition: all 0.2s;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }

        /* List Items */
        .list-item { 
            background: var(--card-bg); 
            padding: 20px; 
            margin: 10px 15px;
            border-radius: 16px;
            border: 1px solid var(--border);
            cursor: pointer; 
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: var(--shadow);
        }
        .list-item:active { transform: scale(0.98); background: var(--bg); }
        .list-item .author-info { font-size: 13px; color: var(--text-light); margin-bottom: 8px; font-weight: 500; }
        .list-item .title { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: var(--text); line-height: 1.3; }
        .list-item .content-preview { font-size: 14px; color: var(--text-light); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; }

        /* FAB & Buttons */
        .write-fab { 
            position: fixed; bottom: 30px; right: 20px; 
            width: 56px; height: 56px; 
            background: var(--primary); color: white; 
            border: none; border-radius: 18px; 
            font-size: 28px; box-shadow: 0 8px 16px rgba(124, 77, 255, 0.4); 
            z-index: 90; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .pagination-btn {
            background: var(--card-bg); border: 1px solid var(--border); 
            padding: 8px 16px; border-radius: 8px; color: var(--text); 
            font-weight: 600; cursor: pointer;
        }
        .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Detail/Write Full Layer */
        .full-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--card-bg); z-index: 150; overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .layer-header {
            padding: 0 20px; height: 60px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--header-bg); position: sticky; top: 0;
        }

        /* Forms */
        .input-group { margin-bottom: 15px; }
        input, textarea { 
            width: 100%; border: 1px solid var(--border); padding: 14px; 
            border-radius: 10px; background: var(--input-bg); color: var(--text); 
            box-sizing: border-box; outline: none; font-size: 15px;
        }
        input:focus, textarea:focus { border-color: var(--primary); }

        .theme-btn { 
            background: var(--primary-soft); color: var(--primary); border: none; 
            padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer;
        }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--primary-soft); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="app">
    <div v-if="isLoading" class="loading-overlay">
        <div class="spinner"></div>
    </div>
    
    <header>
        <div @click="goHome" style="cursor:pointer; display: flex; align-items: center;">
            <img src="wevalue_w.png" alt="Logo" class="header-logo" v-if="false"> <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 8px; margin-right: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">W</div>
            <span class="brand-name">WeValue</span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 10px;">
            <button @click="toggleTheme" class="theme-btn">{{ isDarkMode ? 'LIGHT' : 'DARK' }}</button>
        </div>
    </header>

    <div v-if="viewMode === 'list'">
        <div class="search-container">
            <input v-model="searchQuery" class="search-input" placeholder="궁금한 내용을 검색해보세요">
        </div>

        <div v-for="post in filteredPosts" :key="post.ID" class="list-item" @click="openDetail(post)">
            <div class="author-info">{{ post.Author }} · {{ formatDate(post.Date) }}</div>
            <div class="title">{{ post.Title }}</div>
            <div class="content-preview">{{ post.Content }}</div>
        </div>

        <div style="padding: 30px 20px; display: flex; justify-content: center; align-items: center; gap: 20px;">
            <button class="pagination-btn" :disabled="currentPage === 1" @click="changePage(currentPage - 1)">이전</button>
            <span style="font-weight: bold; font-size: 14px;">{{ currentPage }} / {{ totalPages }}</span>
            <button class="pagination-btn" :disabled="currentPage >= totalPages" @click="changePage(currentPage + 1)">다음</button>
        </div>

        <button class="write-fab" @click="openWrite">+</button>
    </div>

    <div v-if="viewMode === 'write' || viewMode === 'edit'" class="full-layer">
        <div class="layer-header">
            <button @click="handleBack" style="background:none; border:none; color:var(--text-light); font-size:15px; cursor:pointer;">취소</button>
            <strong style="font-size:17px;">{{ viewMode === 'write' ? '새 글 작성' : '수정하기' }}</strong>
            <button @click="viewMode === 'write' ? savePost() : updatePost()" style="background:none; border:none; color:var(--primary); font-weight:bold; font-size:15px; cursor:pointer;">완료</button>
        </div>
        <div style="padding:20px;">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input v-model="form.author" placeholder="닉네임" :disabled="viewMode === 'edit'" style="flex: 1;">
                <input v-model="form.password" type="password" placeholder="비밀번호" style="flex: 1;">
            </div>
            <input v-model="form.title" placeholder="제목" style="margin-bottom: 15px; font-weight: bold; font-size: 18px;">
            <textarea v-model="form.content" rows="15" placeholder="나누고 싶은 이야기를 적어주세요."></textarea>
        </div>
    </div>

    <div v-if="viewMode === 'detail'" class="full-layer">
        <div class="layer-header">
            <button @click="viewMode = 'list'" style="background:none; border:none; color:var(--text-light); font-size: 15px; cursor:pointer;">닫기</button>
            <div v-if="form.author === myId">
                <button @click="viewMode = 'edit'" style="background:none; border:none; color:var(--text-light); margin-right:12px; cursor:pointer;">수정</button>
                <button @click="deletePost" style="background:none; border:none; color:#ff5a5f; font-weight:bold; cursor:pointer;">삭제</button>
            </div>
        </div>
        <div style="padding:30px 24px;">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                <div style="width: 36px; height: 36px; background: var(--primary-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: bold; font-size: 12px;">{{ form.author.substring(0,1) }}</div>
                <div>
                    <div style="font-weight: bold; font-size: 14px;">{{ form.author }}</div>
                    <div style="color: var(--text-light); font-size: 12px;">{{ formatDate(form.date) }}</div>
                </div>
            </div>
            <h2 style="font-size: 22px; font-weight: 800; line-height: 1.4; margin-bottom: 20px;">{{ form.title }}</h2>
            <div style="height: 1px; background: var(--border); margin-bottom: 24px;"></div>
            <p style="font-size: 16px; line-height: 1.8; white-space: pre-wrap; color: var(--text);">{{ form.content }}</p>
        </div>
    </div>
</div>

<script>
    // 스크립트 부분은 기존 로직을 그대로 유지하되 디자인과 연결되는 변수만 확인
    const API_URL = 'https://script.google.com/macros/s/AKfycby0Y2trjJGVx-K000NemLYfKlFvAQSaCJ9rMFJCVMe9tx2N-zJkGyE-T1trPxffAdJ3/exec';
    const CACHE_KEY = 'wevalue_posts_cache';
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
        setup() {
            const posts = ref([]);
            const viewMode = ref('list');
            const isLoading = ref(false);
            const searchQuery = ref('');
            const currentPage = ref(1);
            const totalPages = ref(1);
            const isDarkMode = ref(false);
            const myId = ref(localStorage.getItem('myAnonId') || '');
            const form = ref({ id: '', author: myId.value, title: '', content: '', password: '', date: '' });

            const toggleTheme = () => {
                isDarkMode.value = !isDarkMode.value;
                const mode = isDarkMode.value ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', mode);
                localStorage.setItem('wevalue_theme', mode);
            };

            const fetchPosts = async (useCache = true) => {
                if (useCache && currentPage.value === 1) {
                    const cached = localStorage.getItem(CACHE_KEY);
                    if (cached) posts.value = JSON.parse(cached);
                }
                isLoading.value = true;
                try {
                    const res = await axios.get(`${API_URL}?action=read&page=${currentPage.value}`);
                    posts.value = res.data.posts || [];
                    totalPages.value = res.data.totalPages || 1;
                    if (currentPage.value === 1) localStorage.setItem(CACHE_KEY, JSON.stringify(posts.value));
                } catch(e) { console.error(e); } finally { isLoading.value = false; window.scrollTo(0,0); }
            };

            onMounted(() => {
                const savedTheme = localStorage.getItem('wevalue_theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                    isDarkMode.value = true;
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
                fetchPosts();
            });

            const changePage = (p) => { currentPage.value = p; fetchPosts(); };
            const openWrite = () => { form.value = { id: '', author: myId.value, title: '', content: '', password: '', date: '' }; viewMode.value = 'write'; };
            const openDetail = (post) => { form.value = { id: post.ID, author: post.Author, title: post.Title, content: post.Content, date: post.Date, password: '' }; viewMode.value = 'detail'; };
            const goHome = () => { viewMode.value = 'list'; currentPage.value = 1; fetchPosts(); };
            const handleBack = () => { viewMode.value = 'list'; };

            const savePost = async () => {
                if (!form.value.title || !form.value.content) { alert("제목과 내용을 입력해주세요."); return; }
                isLoading.value = true;
                const params = new URLSearchParams();
                params.append('action', 'create');
                params.append('author', form.value.author || '익명');
                params.append('password', form.value.password);
                params.append('title', form.value.title);
                params.append('content', form.value.content);
                try {
                    await axios({
                        method: 'post',
                        url: API_URL,
                        data: params,
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                    });
                    localStorage.setItem('myAnonId', form.value.author);
                    myId.value = form.value.author;
                    viewMode.value = 'list';
                    fetchPosts(false);
                } catch (e) { alert("저장 실패"); } finally { isLoading.value = false; }
            };

            const formatDate = (dateStr) => {
                const d = new Date(dateStr);
                const now = new Date();
                const diff = (now - d) / 1000;
                if (diff < 60) return '방금 전';
                if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
                return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2, '0')}`;
            };

            const filteredPosts = computed(() => {
                if(!searchQuery.value) return posts.value;
                const q = searchQuery.value.toLowerCase();
                return posts.value.filter(p => String(p.Title).toLowerCase().includes(q) || String(p.Content).toLowerCase().includes(q));
            });

            return { posts, viewMode, isLoading, searchQuery, form, myId, currentPage, totalPages, isDarkMode, filteredPosts, toggleTheme, openDetail, openWrite, changePage, handleBack, goHome, savePost, formatDate };
        }
    }).mount('#app');
</script>
</body>
</html>
