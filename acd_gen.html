<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리가치(WeValue)-현장업무 양식 자동생성 도구</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; font-size: 12px; margin: 20px; color: #333; }
        .header { background-color: #1e4a7e; color: white; padding: 10px; font-weight: bold; border-radius: 4px 4px 0 0; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; table-layout: fixed; }
        th, td { border: 1px solid #ccc; padding: 6px; text-align: center; height: 30px; }
        
        /* 상단 입력 영역 */
        .input-header { background-color: #2c5a8d; color: white; font-size: 11px; }
        .input-row { background-color: #f9f9f9; }
        input { width: 90%; padding: 4px; border: 1px solid #ddd; text-align: center; font-size: 12px; }
        
        /* 강조된 입력 가능 콤보박스 */
        .editable-combo { border: 2px solid #2c5a8d; background-color: #fff; }

        /* 긴급도 입력창 강조 스타일 */
        #a_urgent { font-weight: bold; transition: background-color 0.2s; }

        .case-id-display { background-color: #ffe5cc; font-weight: bold; font-size: 11px; word-break: break-all; }
        .table-head { background-color: #2c5a8d; color: white; font-size: 11px; }
        .row-label { background-color: #e9eff7; font-weight: bold; width: 60px; }
        .cell-readonly { background-color: #dcdcdc; } /* 이미지의 회색 음영 재현 */
        
        /* 결과 셀 (노란색) */
        .cell-result { background-color: #ffff99; text-align: left; font-weight: bold; cursor: pointer; padding-left: 10px; font-size: 12px; }
        .cell-result:hover { background-color: #f0f000; }
        
        .tip-box { background-color: #fffde7; border: 1px solid #ffe082; padding: 10px; border-radius: 4px; margin-top: 10px; }
        .tip-tag { background-color: #eeeeee; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">입력만 하면 복불 문장이 자동 생성됩니다 (현장 A-C-D + 정보성)</div>

<table>
    <tr class="input-header">
        <th>병실</th><th>등록번호</th><th>환자이름</th><th>교수이름</th><th>월일(MMDD)</th><th>시간(HHMM)</th><th style="width: 25%;">CaseID</th>
    </tr>
    <tr class="input-row">
        <td><input type="text" id="ward" value="" oninput="updateAll()"></td>
        <td><input type="text" id="regNo" value="" oninput="updateAll()"></td>
        <td><input type="text" id="patient" value="" oninput="updateAll()"></td>
        <td><input type="text" id="prof" value="" oninput="updateAll()"></td>
        <td><input type="text" id="date" value="" oninput="updateAll()"></td>
        <td><input type="text" id="time" value="" oninput="updateAll()"></td>
        <td id="caseIdTop" class="case-id-display"></td>
    </tr>
</table>

<table>
    <tr class="table-head">
        <th>구분</th>
        <th style="width: 15%;">CaseID</th>
        <th></th> <th>긴급도(10/4/12)</th>
        <th>지금(핵심)</th>
        <th>근거(데이터)</th>
        <th>요청(평가/조치)</th>
        <th>사유코드</th>
        <th>시간(HHMM)</th>
        <th>현재(상태)</th>
        <th>F/U(재보고 기준)</th>
        <th style="width: 30%;">메신저 입력 양식 (복사하여 붙여넣기)</th>
    </tr>
    <tr>
        <td class="row-label">A(보고)</td>
        <td class="cell-readonly case-id-cell"></td>
        <td class="cell-readonly"></td>
        <td>
            <input type="text" id="a_urgent" list="list_urgent" class="editable-combo" placeholder="" oninput="updateAll()">
            <datalist id="list_urgent">
                <option value="10">
                <option value="4">
                <option value="12">
            </datalist>
        </td>
        <td><input type="text" id="a_now" oninput="updateAll()"></td>
        <td><input type="text" id="a_basis" oninput="updateAll()"></td>
        <td><input type="text" id="a_req" oninput="updateAll()"></td>
        <td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td>
        <td class="cell-result" id="res_a" onclick="copyText('res_a')"></td>
    </tr>
    <tr>
        <td class="row-label">C(보호기록)</td>
        <td class="cell-readonly case-id-cell"></td>
        <td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td>
        <td>
            <input type="text" id="c_reason" list="list_reason" class="editable-combo" placeholder="" oninput="updateAll()">
            <datalist id="list_reason">
                <option value="수술중"><option value="시술중"><option value="회진"><option value="인계"><option value="응급상황">
                <option value="담당부재"><option value="정보부족"><option value="인력부족"><option value="기타"><option value="근무종료">
                <option value="업무종료"><option value="익일인계"><option value="야간전환">
            </datalist>
        </td>
        <td><input type="text" id="c_time" oninput="updateAll()"></td>
        <td class="cell-readonly"></td><td class="cell-readonly"></td>
        <td class="cell-result" id="res_c" onclick="copyText('res_c')"></td>
    </tr>
    <tr>
        <td class="row-label">D(완료)</td>
        <td class="cell-readonly case-id-cell"></td>
        <td class="cell-readonly"></td><td><input type="text" id="d_now" oninput="updateAll()"></td><td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td>
        <td><input type="text" id="d_status" oninput="updateAll()"></td>
        <td><input type="text" id="d_fu" oninput="updateAll()"></td>
        <td class="cell-result" id="res_d" onclick="copyText('res_d')"></td>
    </tr>
    <tr>
        <td class="row-label">정보성</td>
        <td class="cell-readonly case-id-cell"></td>
        <td class="cell-readonly"></td><td class="cell-readonly"></td>
        <td>
            <input type="text" id="i_now" list="list_info" class="editable-combo" placeholder="" oninput="updateAll()">
            <datalist id="list_info"><option value="입원"><option value="검사"><option value="자가약"></datalist>
        </td>
        <td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td><td class="cell-readonly"></td>
        <td class="cell-result" id="res_i" onclick="copyText('res_i')"></td>
    </tr>
</table>

<div class="tip-box">
    <strong>사용 팁 :</strong> 양식의 흰색 및 <span class="tip-tag" style="color:#2c5a8d; border:1px solid #2c5a8d;">파란 테두리</span> 입력셀에 정보를 입력하면 메시지가 자동 생성됩니다. (노란 셀 클릭 시 복사)
</div>

<script>
    function updateAll() {
        // 기본 정보 수집
        const ward = document.getElementById('ward').value;
        const regNo = document.getElementById('regNo').value;
        const patient = document.getElementById('patient').value;
        const prof = document.getElementById('prof').value;
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;

        const caseId = `[${ward}]-[${regNo}]-[${patient}]-[${prof}]-[${date}]-[${time}]`;
        
        // CaseID 일괄 적용
        document.getElementById('caseIdTop').innerText = caseId;
        const caseCells = document.getElementsByClassName('case-id-cell');
        for(let c of caseCells) { c.innerText = caseId; }

        // A(보고) 결과
        const aUrgentInput = document.getElementById('a_urgent');
        const aUrgentVal = aUrgentInput.value;
        
        // 색상 초기화
        aUrgentInput.style.backgroundColor = "";
        aUrgentInput.style.color = "";

        // 값에 따른 색상 적용
        if(aUrgentVal === "10") {
            aUrgentInput.style.backgroundColor = "red";
            aUrgentInput.style.color = "white";
        } else if(aUrgentVal === "4") {
            aUrgentInput.style.backgroundColor = "orange";
            aUrgentInput.style.color = "white";
        } else if(aUrgentVal === "12") {
            aUrgentInput.style.backgroundColor = "green";
            aUrgentInput.style.color = "white";
        }

        const aNow = document.getElementById('a_now').value;
        const aBasis = document.getElementById('a_basis').value;
        const aReq = document.getElementById('a_req').value;
        document.getElementById('res_a').innerText = `[A]${caseId} / 지금: ${aNow} / 근거: ${aBasis} / 요청: ${aReq} / ${aUrgentVal}`;

        // C(보호기록) 결과
        const cReason = document.getElementById('c_reason').value || "인계";
        const cTime = document.getElementById('c_time').value;
        document.getElementById('res_c').innerText = `[C]${caseId} / ${cReason} / 다음확인 ${cTime} (전화 1회 후)`;

        // D(완료) 결과
        const dNow = document.getElementById('d_now').value;
        const dStatus = document.getElementById('d_status').value;
        const dFu = document.getElementById('d_fu').value;
        document.getElementById('res_d').innerText = `[D]${caseId} / 결과:${dNow} / 현재:${dStatus} / F/U:${dFu}`;

        // 정보성 결과
        const iNow = document.getElementById('i_now').value || "입원";
        document.getElementById('res_i').innerText = `(보고)${caseId}/${iNow}/12`;
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        if(!text) return;
        navigator.clipboard.writeText(text).then(() => {
            alert("복사되었습니다: " + text);
        });
    }

    // 초기 실행
    window.onload = updateAll;
</script>

</body>
</html>
