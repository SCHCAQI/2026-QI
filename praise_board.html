<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeValue - 익명게시판</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        /* 기존 CSS 변수 및 공통 스타일 유지 */
        :root { --primary: #7c4dff; --primary-soft: #f3efff; --bg: #f2f4f7; --header-bg: #ffffff; --card-bg: #ffffff; --text: #1a1a1a; --text-light: #707070; --border: #eaecf0; --shadow: 0 2px 8px rgba(0,0,0,0.05); }
        [data-theme='dark'] { --bg: #121212; --header-bg: #1e1e1e; --card-bg: #1e1e1e; --text: #e8e8e8; --text-light: #a0a0a0; --border: #2c2c2c; --primary-soft: #2d1b4d; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 40px; transition: background 0.3s; }
        header { background: var(--header-bg); padding: 0 20px; height: 64px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
        .brand-name { font-size: 18px; font-weight: 800; color: var(--primary); }
        .search-container { padding: 15px 20px; background: var(--header-bg); }
        .search-input { width: 100%; border: 1px solid var(--border); background: var(--bg); border-radius: 12px; padding: 10px 16px; box-sizing: border-box; }
        .list-item { background: var(--card-bg); padding: 20px; margin: 10px 15px; border-radius: 16px; border: 1px solid var(--border); cursor: pointer; box-shadow: var(--shadow); }
        .list-item .title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
        .list-item .content-preview { font-size: 14px; color: var(--text-light); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .write-fab { position: fixed; bottom: 30px; right: 20px; width: 56px; height: 56px; background: var(--primary); color: white; border: none; border-radius: 18px; font-size: 28px; box-shadow: 0 8px 16px rgba(124, 77, 255, 0.4); cursor: pointer; }
        .pagination-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .theme-btn { background: var(--primary-soft); color: var(--primary); border: none; padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--primary-soft); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="app">
    <div v-if="isLoading" class="loading-overlay"><div class="spinner"></div></div>
    
    <header>
        <div @click="goHome" style="cursor:pointer; display:flex; align-items:center;">
            <div style="width:32px; height:32px; background:var(--primary); border-radius:8px; margin-right:10px; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">W</div>
            <span class="brand-name">WeValue</span>
        </div>
        <button @click="toggleTheme" class="theme-btn">{{ isDarkMode ? 'LIGHT' : 'DARK' }}</button>
    </header>

    <div class="search-container">
        <input v-model="searchQuery" class="search-input" placeholder="궁금한 내용을 검색해보세요">
    </div>

    <div v-for="post in filteredPosts" :key="post.Id" class="list-item" @click="goToDetail(post.Id)">
        <div style="font-size:13px; color:var(--text-light); margin-bottom:8px;">{{ post.Author }} · {{ formatDate(post.Date) }}</div>
        <div class="title">{{ post.Title }}</div>
        <div class="content-preview">{{ post.Content }}</div>
    </div>

    <div style="padding:30px 20px; display:flex; justify-content:center; align-items:center; gap:20px;">
        <button class="pagination-btn" :disabled="currentPage === 1" @click="changePage(currentPage - 1)">이전</button>
        <span style="font-weight:bold; font-size:14px;">{{ currentPage }} / {{ totalPages }}</span>
        <button class="pagination-btn" :disabled="currentPage >= totalPages" @click="changePage(currentPage + 1)">다음</button>
    </div>

    <button class="write-fab" @click="goToWrite">+</button>
    
    <p style="text-align:center">Ui.{{uiVersion}}/Svr.{{svrVersion}}</p>
</div>


<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyvG_5DBIzaolZnuzK_-2x3Fmgl45Guhgvy_lcAzaPhFJRVVDU8bRqhbpt1X4vDG1ig/exec';
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
        setup() {
            const posts = ref([]);
            const isLoading = ref(false);
            const searchQuery = ref('');
            const currentPage = ref(1);
            const totalPages = ref(1);
            const isDarkMode = ref(localStorage.getItem('wevalue_theme') === 'dark');
            
            // 버전 관련 변수
            const uiVersion = ref('20260412.8'); // UI 버전
            const svrVersion = ref('Loading...');   // 서버 버전
            
            const toggleTheme = () => {
                isDarkMode.value = !isDarkMode.value;
                const mode = isDarkMode.value ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', mode);
                localStorage.setItem('wevalue_theme', mode);
            };

            const fetchPosts = async () => {
                isLoading.value = true;
                try {
                    const res = await axios.get(`${API_URL}?action=read&page=${currentPage.value}`);
                    posts.value = res.data.posts || [];
                    totalPages.value = res.data.totalPages || 1;
                } catch(e) { console.error(e); } finally { isLoading.value = false; }
            };

            const getVersion = async () => {
                try {
                    const res = await axios.get(`${API_URL}?action=version`);
                    svrVersion.value = res.data.version;
                } catch(e) { console.error(e); } finally { isLoading.value = false; }
            };

            const goToDetail = (id) => { location.href = `detail.html?id=${id}`; alert(id);};
            const goToWrite = () => { location.href = `detail.html?mode=write`; };
            const changePage = (p) => { currentPage.value = p; fetchPosts(); };
            const formatDate = (dateStr) => {
                const d = new Date(dateStr);
                return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2, '0')}`;
            };

            const filteredPosts = computed(() => {
                if(!searchQuery.value) return posts.value;
                const q = searchQuery.value.toLowerCase();
                return posts.value.filter(p => String(p.Title).toLowerCase().includes(q) || String(p.Content).toLowerCase().includes(q));
            });

            onMounted(() => {
                if(isDarkMode.value) document.documentElement.setAttribute('data-theme', 'dark');
                fetchPosts();
                getVersion();
            });

            return { filteredPosts, isLoading, searchQuery, currentPage, totalPages, isDarkMode, toggleTheme, goToDetail, goToWrite, changePage, formatDate, uiVersion, svrVersion };
        }
    }).mount('#app');
</script>
</body>
</html>
